<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Be a Handler</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #111, #000);
      color: white;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LOGO */
    .logo {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      opacity: 0.9;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
      z-index: 3;
    }

    /* MULTI GLOW */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }

    .g1 { background: radial-gradient(circle, rgba(0,255,156,0.4), transparent 60%); }
    .g2 { background: radial-gradient(circle, rgba(0,255,200,0.25), transparent 60%); }
    .g3 { background: radial-gradient(circle, rgba(0,180,255,0.2), transparent 60%); }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 6px;
      font-weight: 300;
      background: linear-gradient(90deg, #fff, #00ff9c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(0,255,156,0.3);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 180px);
      gap: 15px;
      justify-content: center;
    }

    .btn {
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(25px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(0,255,156,0.4), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn:hover::after { opacity: 1; }

    .btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 25px rgba(0,255,156,0.5);
      border-color: rgba(0,255,156,0.4);
    }

    /* SOCIALS */
    .socials {
      position: absolute;
      bottom: 35px;
      display: flex;
      gap: 18px;
      z-index: 3;
    }

    .icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(15px);
    }

    .icon:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(0,255,156,0.7);
    }

    .icon img { width: 22px; height: 22px; }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 5px;
      font-size: 0.7rem;
      opacity: 0.4;
      z-index: 3;
    }

  </style>
</head>
<body>

<!-- LOGO (положи файл logo.png рядом с этим html) -->
<img src="logo.png" class="logo" alt="HZ Logo">

<div class="glow g1" id="g1"></div>
<div class="glow g2" id="g2"></div>
<div class="glow g3" id="g3"></div>

<div class="container">
  <h1>BE A HANDLER.</h1>
  <div class="subtitle">Just handle...</div>

  <div class="grid">
    <button class="btn" onclick="go('chat')">Chat</button>
    <button class="btn" onclick="go('voice')">Voice</button>
    <button class="btn" onclick="go('spill')">Spill</button>
    <button class="btn" onclick="go('events')">Events</button>
  </div>
</div>

<!-- SOCIAL ICONS -->
<div class="socials">
  <div class="icon" onclick="goSocial('discord')">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="discord">
  </div>
  <div class="icon" onclick="goSocial('tiktok')">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="tiktok">
  </div>
</div>

<div class="footer">© HZ FAMILY</div>

<script>
  const links = {
    chat: "https://forms.gle/YOUR_CHAT_FORM",
    spill: "https://forms.gle/YOUR_SPILL_FORM",
    events: "https://forms.gle/YOUR_EVENTS_FORM",
    voice: "https://forms.gle/YOUR_VOICE_FORM"
  };

  function go(type) {
    window.location.href = links[type];
  }

  // SOCIAL LINKS (замени потом)
  const socials = {
    discord: "https://discord.gg/YOUR_SERVER",
    tiktok: "https://tiktok.com/@YOUR_TIKTOK"
  };

  function goSocial(type) {
    window.location.href = socials[type];
  }

  // SMOOTH TRAILING GLOW
  const g1 = document.getElementById('g1');
  const g2 = document.getElementById('g2');
  const g3 = document.getElementById('g3');

  let mouseX = 0, mouseY = 0;
  let x1 = 0, y1 = 0;
  let x2 = 0, y2 = 0;
  let x3 = 0, y3 = 0;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    x1 += (mouseX - x1) * 0.15;
    y1 += (mouseY - y1) * 0.15;

    x2 += (mouseX - x2) * 0.08;
    y2 += (mouseY - y2) * 0.08;

    x3 += (mouseX - x3) * 0.04;
    y3 += (mouseY - y3) * 0.04;

    g1.style.left = x1 + 'px';
    g1.style.top = y1 + 'px';

    g2.style.left = x2 + 'px';
    g2.style.top = y2 + 'px';

    g3.style.left = x3 + 'px';
    g3.style.top = y3 + 'px';

    requestAnimationFrame(animate);
  }

  animate();

  // BUTTON LIGHT FOLLOW
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty('--x', (e.clientX - rect.left) + 'px');
      btn.style.setProperty('--y', (e.clientY - rect.top) + 'px');
    });
  });
</script>

</body>
</html>
